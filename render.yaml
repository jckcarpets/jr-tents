# Render.com blueprint — auto-configures the web service when you
# choose "New +" -> "Blueprint" and pick this repository.
services:
  - type: web
    name: jr-tents
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_supabase:app
    envVars:
      - key: SUPABASE_DB_URL
        sync: false   # you paste your secret connection string in the dashboard
